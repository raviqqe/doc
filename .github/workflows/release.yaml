name: release
on:
  push:
    branches:
      - main
  pull_request:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true
env:
  MUFFET_OPTIONS: >
    --accepted-status-codes 200,202,403,429
    --buffer-size 65536
    --exclude github.com/raviqqe/stak/blob
    --exclude raviqqe.com/stak
    --exclude singapore-2025.pdf
    --exclude tab=readme-ov-file
    --exclude twitter.com
    --exclude www.gnu.org/software/.*
    --header accept:text/html,*/*
    --header user-agent:muffet
    --max-retries 10
jobs:
  release_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0 # for creation times of pages
          lfs: true
      - uses: ./.github/actions/setup
      - uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4.0.0
      - run: node --run build
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: doc/dist
      - uses: actions/deploy-pages@decdde0ac072f6dcbe43649d82d9c635fff5b4e4 # v4.0.4
        if: github.ref == 'refs/heads/main'
  release_test:
    needs:
      - release_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          lfs: true
      - uses: ./.github/actions/setup
      - run: go tool muffet $MUFFET_OPTIONS https://raviqqe.com/doc
  release:
    needs:
      - release_build
      - release_test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: for result in ${{ join(needs.*.result, ' ') }}; do [ $result = success ]; done
